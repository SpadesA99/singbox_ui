name: Build and Push Docker Image

on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - master
      - main
      - feature/sing-box
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{github.repository}}
  SINGBOX_VERSION: v1.13.5

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{env.REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{env.REGISTRY}}/${{env.IMAGE_NAME}}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=version
            type=semver,pattern=major.minor
            type=semver,pattern=major
            type=sha,prefix=branch-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Pull and save sing-box images
        run: |
          docker pull --platform linux/amd64 ghcr.io/sagernet/sing-box:${{env.SINGBOX_VERSION}}
          docker tag ghcr.io/sagernet/sing-box:${{env.SINGBOX_VERSION}} singbox:amd64
          docker save singbox:amd64 -o singbox-amd64.tar

          docker pull --platform linux/arm64 ghcr.io/sagernet/sing-box:${{env.SINGBOX_VERSION}}
          docker tag ghcr.io/sagernet/sing-box:${{env.SINGBOX_VERSION}} singbox:arm64
          docker save singbox:arm64 -o singbox-arm64.tar

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{github.event_name != 'pull_request'}}
          tags: ${{steps.meta.outputs.tags}}
          labels: ${{steps.meta.outputs.labels}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
