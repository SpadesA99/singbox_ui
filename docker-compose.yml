version: '3.8'

services:
  singbox-ui:
    image: ghcr.io/spadesa99/singbox_ui:feature-sing-box
    container_name: singbox-ui
    restart: unless-stopped
    network_mode: host
    volumes:
      # Docker socket - 用于管理 sing-box 容器
      - /var/run/docker.sock:/var/run/docker.sock
      # 数据目录 - 存储配置文件
      - ./data:/home/data
    environment:
      # 容器内数据目录
      - DATA_DIR=/home/data
      # 宿主机 singbox 配置目录（用于挂载到 sing-box 容器）
      - HOST_SINGBOX_DIR=${PWD}/data/singbox
      # 时区
      - TZ=Asia/Shanghai
